<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ARCS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Sora:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="atmosphere" aria-hidden="true"></div>

  <div class="shell">
    <div id="public-banner" class="public-banner hidden" role="status"></div>

    <header class="chat-header">
      <div class="brand-block">
        <h1 class="brand">ARCS</h1>
        <p class="tagline">Adaptive Routing &amp; Correction</p>
      </div>
      <p class="header-hint">Route · generate · verify</p>
    </header>

    <main id="transcript" class="transcript" aria-live="polite">
      <div id="empty-state" class="empty-state">
        <p class="empty-lead">Ask anything across coding, medical, legal, or general.</p>
        <p class="empty-sub">Each reply is routed to a specialist pipeline, then verified.</p>
      </div>
    </main>

    <footer class="composer-wrap">
      <form id="composer" class="composer" autocomplete="off">
        <label class="sr-only" for="query">Message</label>
        <textarea
          id="query"
          rows="1"
          placeholder="Message ARCS…"
          maxlength="4000"
        ></textarea>
        <button id="submit" type="submit" class="send-btn" aria-label="Send">
          <span class="send-label">Send</span>
        </button>
      </form>
      <p class="composer-hint">Enter to send · Shift+Enter for newline · first reply can take a few minutes</p>
    </footer>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
