<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ARCS Demo</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <h1>ARCS</h1>
      <p class="subtitle">Adaptive Routing &amp; Correction System</p>
    </header>

    <section class="card ask-card">
      <label for="query">Your question</label>
      <textarea
        id="query"
        rows="3"
        placeholder="e.g. What are the symptoms of diabetes?"
      ></textarea>
      <button id="submit" type="button" class="btn primary">Ask ARCS</button>
    </section>

    <section id="loading" class="loading hidden" aria-live="polite">
      <div class="spinner"></div>
      <p>Routing, generating, and verifying…</p>
      <p class="loading-hint">First request can take 2–4 minutes. Do not refresh.</p>
    </section>

    <section id="result" class="card result-card hidden">
      <div class="meta">
        <span id="meta-domain" class="pill"></span>
        <span id="meta-verdict" class="pill"></span>
        <span id="meta-timing" class="pill muted"></span>
      </div>
      <h2>Answer</h2>
      <div id="answer" class="answer"></div>

      <div id="feedback-section" class="feedback-section">
        <p>Was this answer helpful?</p>
        <div class="feedback-buttons">
          <button id="btn-positive" type="button" class="btn feedback positive" title="Helpful">
            👍 Yes
          </button>
          <button id="btn-negative" type="button" class="btn feedback negative" title="Not helpful">
            👎 No
          </button>
        </div>
        <p id="feedback-msg" class="feedback-msg hidden"></p>
      </div>
    </section>

    <section id="error" class="card error-card hidden" role="alert">
      <p id="error-text"></p>
    </section>

    <footer class="footer">
      <p>Query → Router → Pipeline → Verify → Your feedback → Attribution → Repair</p>
    </footer>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
