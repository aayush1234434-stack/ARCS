name: CI

on:
  push:
    branches:
      - main
      - phase-1-repair-loops
  pull_request:
    branches:
      - main
      - phase-1-repair-loops

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import smoke test
        run: python -c "from arcs.main import run_pipeline"

      - name: Run tests
        run: pytest tests/ -q
