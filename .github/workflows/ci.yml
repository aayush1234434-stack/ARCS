name: CI

on:
  push:
    branches:
      - main
      - phase-1-repair-loops
  pull_request:
    branches:
      - main
      - phase-1-repair-loops

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -q

  smoke-e2e:
    name: smoke e2e (optional — needs secrets)
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Note
        run: |
          echo "Optional job (continue-on-error). Live e2e needs GROQ_API_KEY and NVIDIA_API_KEY repository secrets."

      - name: Train router if checkpoint missing
        run: |
          if [ ! -f artifacts/router-model/config.json ]; then
            python -m arcs.router.train --epochs 2
          fi

      - name: Smoke e2e dry-run
        run: python scripts/smoke_e2e.py --dry-run --json

      - name: Live smoke e2e (5 fixed queries)
        if: env.GROQ_API_KEY != '' && env.NVIDIA_API_KEY != ''
        env:
          ARCS_ROUTER_BACKEND: torch
        run: python scripts/smoke_e2e.py --json --quiet
