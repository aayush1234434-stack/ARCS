# Optional end-to-end pipeline smoke test.
#
# Requires repository secrets (Settings → Secrets → Actions):
#   GROQ_API_KEY
#   NVIDIA_API_KEY
#
# Dry-run always runs (no secrets). Live smoke runs only when both secrets are
# set; otherwise the live step is skipped with a notice (workflow stays green).
# See docs/DEPLOY.md § Post-deploy verification.

name: Smoke E2E

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  smoke-e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check API secrets
        id: secrets
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          if [ -n "$GROQ_API_KEY" ] && [ -n "$NVIDIA_API_KEY" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dry-run smoke plan (no API)
        run: python scripts/smoke_e2e.py --dry-run --json

      - name: Train router if checkpoint missing
        if: steps.secrets.outputs.present == 'true'
        run: |
          if [ ! -f artifacts/router-model/config.json ]; then
            python -m arcs.router.train --epochs 2
          fi

      - name: Live smoke e2e (5 fixed queries)
        if: steps.secrets.outputs.present == 'true'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          ARCS_ROUTER_BACKEND: torch
        run: python scripts/smoke_e2e.py --json --quiet

      - name: Live smoke skipped (secrets not configured)
        if: steps.secrets.outputs.present != 'true'
        run: |
          echo "::notice::Skipping live smoke e2e — set GROQ_API_KEY and NVIDIA_API_KEY repository secrets to enable."
